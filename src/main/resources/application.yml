spring:
  application:
    name: Mock

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8083/realms/mock

  # Reactive connection the APP uses at runtime (R2DBC, non-blocking).
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/mock
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    pool:
      initial-size: 2
      max-size: 10

  # Blocking JDBC connection used ONLY by Flyway at startup (not by the app).
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/mock
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:Q09nfCQwRi9mO1JmfTx2MSRATWM1ajdNInI/MCZCX1BGd1JuLldHdy41JVkgQn5yTntSbiMlNDVdWTpRKGEiKVRYY2w8LHE=}
  expiration-ms: 3600000

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}